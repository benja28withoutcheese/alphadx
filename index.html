<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha DX - Álbum Institucional</title>
    <style>
        :root {
            --primary-dark: #050b18;
            --card-bg: #112240;
            --accent-gold: #ffcc00;
            --accent-blue: #00d4ff;
            --text-white: #ffffff;
            --empty-slot: rgba(255, 255, 255, 0.05);
            --trade-purple: #a855f7;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-dark);
            color: var(--text-white);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid var(--accent-gold);
            padding-bottom: 15px;
            width: 100%;
            max-width: 900px;
        }

        h1 {
            font-size: clamp(2rem, 8vw, 3.5rem);
            margin: 0;
            color: var(--accent-gold);
            text-shadow: 0 0 20px rgba(255, 204, 0, 0.3);
            letter-spacing: 4px;
        }

        .subtitle {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-blue);
        }

        /* --- MODAL DE APERTURA --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            perspective: 1000px;
        }

        .modal-content { text-align: center; }

        .card-inner {
            width: 220px;
            height: 310px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card-inner.flipped { transform: rotateY(180deg); }

        .card-back, .card-front {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            border: 4px solid var(--accent-gold);
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.2);
        }

        .card-back {
            background: var(--card-bg);
            font-size: 5rem;
        }

        .card-front {
            background: linear-gradient(145deg, #162c50, #050b18);
            transform: rotateY(180deg);
        }

        /* --- UI DEL JUEGO --- */
        .game-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 1000px;
            margin-bottom: 40px;
        }

        .panel {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            flex: 1;
            min-width: 300px;
            max-width: 450px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .math-box {
            font-size: 2.2rem;
            font-weight: bold;
            margin: 15px 0;
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
        }

        input[type="number"] {
            background: var(--primary-dark);
            border: 2px solid var(--accent-gold);
            color: white;
            padding: 12px;
            font-size: 1.5rem;
            width: 100px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 15px;
        }

        button {
            padding: 12px 24px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            background: var(--accent-gold);
            color: var(--primary-dark);
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        button:hover:not(:disabled) { transform: scale(1.05); }
        button:disabled { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }

        .album-nav { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        .nav-btn { background: transparent; color: white; border: 1px solid var(--accent-blue); padding: 6px 12px; font-size: 0.8rem; }
        .nav-btn.active { background: var(--accent-blue); color: var(--primary-dark); }

        .album-page {
            display: none;
            width: 100%;
            max-width: 900px;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
        }
        .album-page.active { display: grid; animation: fadeIn 0.4s; }

        /* --- STICKERS --- */
        .sticker {
            aspect-ratio: 3/4;
            background: var(--empty-slot);
            border: 2px dashed rgba(0, 212, 255, 0.1);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.3s ease;
        }

        .sticker:not(.owned):hover {
            border-color: var(--accent-blue);
            background: rgba(0, 212, 255, 0.08);
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.2);
        }
        
        .sticker:not(.owned):hover div {
            animation: pulseHint 1s infinite;
            color: var(--accent-blue);
        }

        .sticker.owned {
            background: linear-gradient(145deg, #162c50, #0a192f);
            border: 2px solid var(--accent-gold);
        }

        .sticker.owned:hover {
            transform: scale(1.05);
            z-index: 5;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .repeat-tag {
            position: absolute;
            top: -5px; right: -5px;
            background: #ff4757;
            padding: 4px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .progress-section { width: 100%; max-width: 900px; margin-bottom: 30px; text-align: center; }
        .progress-bar { height: 12px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 10px; overflow: hidden; }
        #progress-fill { height: 100%; background: var(--accent-gold); width: 0%; transition: width 1s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes pulseHint {
            0% { transform: scale(1); opacity: 0.1; }
            50% { transform: scale(1.2); opacity: 0.5; }
            100% { transform: scale(1); opacity: 0.1; }
        }
    </style>
</head>
<body>

    <header>
        <h1>ALPHA DX</h1>
        <div class="subtitle">Colección Institucional ECOEMS</div>
    </header>

    <div class="progress-section">
        <strong id="statsText">0 / 45 FIGURITAS</strong>
        <div id="repeat-count" style="color: var(--accent-blue); font-size: 0.9rem; margin-top: 5px;">Repetidas: 0</div>
        <div class="progress-bar"><div id="progress-fill"></div></div>
    </div>

    <div class="game-container">
        <div class="panel">
            <div id="quiz-ui">
                <p>Resuelve para ganar un sobre:</p>
                <div class="math-box" id="equation">--</div>
                <input type="number" id="user-answer" placeholder="?">
                <br>
                <button onclick="checkMath()">Validar</button>
            </div>
            <div id="reward-ui" style="display:none;">
                <h3 style="color: var(--accent-gold);">¡CORRECTO!</h3>
                <div style="font-size: 3rem; margin: 10px 0;">📦</div>
                <button onclick="openPack()">Abrir Sobre</button>
            </div>
        </div>

        <div class="panel">
            <h3 style="color: var(--trade-purple);">TRADEO</h3>
            <p style="font-size: 0.8rem;">Canjea 2 repetidas</p>
            <div style="font-size: 2rem; margin: 10px 0;">🔄</div>
            <button id="btnTrade" style="background: var(--trade-purple); color:white" onclick="handleTrade()" disabled>Intercambiar (2)</button>
        </div>
    </div>

    <div class="album-nav" id="nav-container"></div>
    <div id="pages-container"></div>

    <!-- MODAL DE APERTURA -->
    <div id="card-modal" class="modal-overlay">
        <div class="modal-content">
            <div id="card-reveal" class="card-inner">
                <div class="card-back">📦</div>
                <div class="card-front">
                    <div id="modal-icon" style="font-size: 5rem;"></div>
                    <div id="modal-name" style="font-size: 1.4rem; font-weight: bold; margin-top: 15px; padding: 0 10px;"></div>
                    <div id="modal-rarity" style="color: var(--accent-gold); margin-top: 10px; font-weight: bold;"></div>
                </div>
            </div>
            <br>
            <button onclick="closeModal()" style="margin-top: 20px;">Coleccionar</button>
        </div>
    </div>

    <button class="btn-reset" style="margin-top:40px; opacity:0.5; background:transparent; color:red; border:1px solid red" onclick="resetAlbum()">Reiniciar Álbum</button>

    <script>
        const CONFIG = {
            cards: [
                { id: 0, name: "Alpha dx", page: 1, icon: "🛡️" },
                { id: 1, name: "ECOEMS 2026", page: 1, icon: "🎓" },
                { id: 2, name: "128 ACIERTOS", page: 1, icon: "💯" },
                { id: 3, name: "Benjamín", page: 2, icon: "👨‍🏫" },
                { id: 4, name: "Hans", page: 2, icon: "👨‍💻" },
                { id: 5, name: "Rainer", page: 2, icon: "🔬" },
                { id: 6, name: "Física", page: 3, icon: "⚛️" },
                { id: 7, name: "Historia", page: 3, icon: "📜" },
                { id: 8, name: "Hab. Verbal", page: 3, icon: "🗣️" },
                { id: 9, name: "Dentista", page: 4, icon: "🦷" },
                { id: 10, name: "Beta dx", page: 4, icon: "🚀" },
                { id: 11, name: "Milenials dx", page: 4, icon: "📱" },
                { id: 12, name: "Tiktok", page: 5, icon: "🎵" },
                { id: 13, name: "Whatsapp", page: 5, icon: "💬" },
                { id: 14, name: "Zoom", page: 5, icon: "📹" },
                { id: 15, name: "Apuntes", page: 6, icon: "📝" },
                { id: 16, name: "Examen simulacro", page: 6, icon: "✍️" },
                { id: 17, name: "Clases Grabadas", page: 6, icon: "🎥" },
                { id: 18, name: "Alpha Dx Oro", page: 7, icon: "🥇" },
                { id: 19, name: "Alpha Dx Plata", page: 7, icon: "🥈" },
                { id: 20, name: "Alpha Dx Cobre", page: 7, icon: "🥉" },
                { id: 21, name: "Porfirio Díaz", page: 8, icon: "🎩" },
                { id: 22, name: "Álvaro Obregón", page: 8, icon: "🎖️" },
                { id: 23, name: "Emiliano Zapata", page: 8, icon: "🐎" },
                { id: 24, name: "Isaac Newton", page: 9, icon: "🍎" },
                { id: 25, name: "Pitágoras", page: 9, icon: "📐" },
                { id: 26, name: "Einstein", page: 9, icon: "🧠" },
                { id: 27, name: "Relieve", page: 10, icon: "⛰️" },
                { id: 28, name: "Clima", page: 10, icon: "☀️" },
                { id: 29, name: "Vegetación", page: 10, icon: "🌿" },
                // --- PÁGINA 11: Música ---
                { id: 30, name: "Jay Z", page: 11, icon: "🎤" },
                { id: 31, name: "Kanye", page: 11, icon: "🕶️" },
                { id: 32, name: "Eminem", page: 11, icon: "📻" },
                // --- PÁGINA 12: Química ---
                { id: 33, name: "Enlace Covalente", page: 12, icon: "🤝" },
                { id: 34, name: "Enlace Iónico", page: 12, icon: "🔋" },
                { id: 35, name: "Enlace Metálico", page: 12, icon: "🏗️" },
                // --- PÁGINA 13: Personajes Históricos ---
                { id: 36, name: "Napoleon Bonaparte", page: 13, icon: "⚔️" },
                { id: 37, name: "Leonardo da Vinci", page: 13, icon: "🎨" },
                { id: 38, name: "Galileo Galilei", page: 13, icon: "🔭" },
                // --- PÁGINA 14: Políticos USA ---
                { id: 39, name: "George Washington", page: 14, icon: "🏛️" },
                { id: 40, name: "Abraham Lincoln", page: 14, icon: "🎩" },
                { id: 41, name: "Thomas Jefferson", page: 14, icon: "🖋️" },
                // --- PÁGINA 15: Instituciones ---
                { id: 42, name: "CCH", page: 15, icon: "🏫" },
                { id: 43, name: "ENP", page: 15, icon: "🏫" },
                { id: 44, name: "CECyT", page: 15, icon: "🏫" }
            ],
            tradeCost: 2
        };

        let inventory = JSON.parse(localStorage.getItem('alphaDxPremium')) || {};
        let currentResult = 0;
        let audioCtx = null;

        function buildAlbumStructure() {
            const nav = document.getElementById('nav-container');
            const container = document.getElementById('pages-container');
            nav.innerHTML = '';
            container.innerHTML = '';
            const maxPage = 15;
            for(let i=1; i<=maxPage; i++) {
                nav.innerHTML += `<button class="nav-btn ${i===1?'active':''}" onclick="showPage(${i})">Pág ${i}</button>`;
                container.innerHTML += `<div id="p${i}" class="album-page ${i===1?'active':''}"></div>`;
            }
        }

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(freq, type, duration, vol = 0.1) {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function newChallenge() {
            const ops = ['+', '-', '*'];
            const op = ops[Math.floor(Math.random() * ops.length)];
            let n1 = Math.floor(Math.random() * 10) + 1;
            let n2 = Math.floor(Math.random() * 10) + 1;
            currentResult = (op==='+')? n1+n2 : (op==='-')? n1-n2 : n1*n2;
            document.getElementById('equation').innerText = `${n1} ${(op==='*')?'×':op} ${n2}`;
            document.getElementById('user-answer').value = '';
        }

        function checkMath() {
            const val = parseInt(document.getElementById('user-answer').value);
            if (val === currentResult) {
                playSound(880, 'sine', 0.2);
                document.getElementById('quiz-ui').style.display = 'none';
                document.getElementById('reward-ui').style.display = 'block';
            } else {
                playSound(150, 'sawtooth', 0.3);
                alert("¡Error! Revisa tus cálculos.");
            }
        }

        function openPack() {
            const randomCard = CONFIG.cards[Math.floor(Math.random() * CONFIG.cards.length)];
            const isNew = !inventory[randomCard.id];
            
            inventory[randomCard.id] = (inventory[randomCard.id] || 0) + 1;
            localStorage.setItem('alphaDxPremium', JSON.stringify(inventory));

            document.getElementById('modal-icon').innerText = randomCard.icon;
            document.getElementById('modal-name').innerText = randomCard.name;
            document.getElementById('modal-rarity').innerText = isNew ? "✨ ¡NUEVA!" : "🃏 REPETIDA";
            document.getElementById('modal-rarity').style.color = isNew ? "var(--accent-gold)" : "#aaa";
            
            const modal = document.getElementById('card-modal');
            const cardInner = document.getElementById('card-reveal');
            modal.style.display = 'flex';
            cardInner.classList.remove('flipped');

            setTimeout(() => {
                cardInner.classList.add('flipped');
                playSound(600, 'sine', 0.4);
            }, 500);

            updateUI();
            newChallenge();
            document.getElementById('quiz-ui').style.display = 'block';
            document.getElementById('reward-ui').style.display = 'none';
        }

        function closeModal() {
            document.getElementById('card-modal').style.display = 'none';
        }

        function handleTrade() {
            let consumed = 0;
            for (let id in inventory) {
                while (inventory[id] > 1 && consumed < CONFIG.tradeCost) {
                    inventory[id]--;
                    consumed++;
                }
            }
            openPack();
        }

        function updateUI() {
            for (let i = 1; i <= 15; i++) {
                const container = document.getElementById(`p${i}`);
                if (!container) continue;
                container.innerHTML = '';
                CONFIG.cards.filter(c => c.page === i).forEach(card => {
                    const count = inventory[card.id] || 0;
                    const div = document.createElement('div');
                    div.className = `sticker ${count > 0 ? 'owned' : ''}`;
                    div.innerHTML = count > 0 ? 
                        `<div style="font-size:2.5rem">${card.icon}</div><div style="font-size:0.7rem;font-weight:bold">${card.name}</div>${count>1?`<div class="repeat-tag">x${count-1}</div>`:''}` :
                        `<div style="opacity:0.1; font-size:2rem">?</div>`;
                    container.appendChild(div);
                });
            }

            const unique = Object.keys(inventory).length;
            const total = CONFIG.cards.length;
            const repeats = Object.values(inventory).reduce((acc, c) => acc + (c > 1 ? c - 1 : 0), 0);
            
            document.getElementById('statsText').innerText = `${unique} / ${total} FIGURITAS`;
            document.getElementById('progress-fill').style.width = `${(unique/total)*100}%`;
            document.getElementById('repeat-count').innerText = `Repetidas: ${repeats}`;
            document.getElementById('btnTrade').disabled = repeats < CONFIG.tradeCost;
        }

        function showPage(num) {
            playSound(440, 'triangle', 0.05, 0.05);
            document.querySelectorAll('.album-page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`p${num}`).classList.add('active');
            const btns = document.querySelectorAll('.nav-btn');
            if(btns[num-1]) btns[num-1].classList.add('active');
        }

        function resetAlbum() {
            if(confirm("¿Borrar todo?")) { localStorage.removeItem('alphaDxPremium'); location.reload(); }
        }

        buildAlbumStructure();
        updateUI();
        newChallenge();
    </script>
</body>
</html>
