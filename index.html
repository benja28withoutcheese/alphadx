<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha DX - Álbum Institucional</title>
    <style>
        :root {
            --primary-dark: #050b18;
            --card-bg: #112240;
            --accent-gold: #ffcc00;
            --accent-blue: #00d4ff;
            --text-white: #ffffff;
            --empty-slot: rgba(255, 255, 255, 0.05);
            --trade-purple: #a855f7;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-dark);
            color: var(--text-white);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid var(--accent-gold);
            padding-bottom: 15px;
            width: 100%;
            max-width: 900px;
        }

        h1 {
            font-size: clamp(2rem, 8vw, 3.5rem);
            margin: 0;
            color: var(--accent-gold);
            text-shadow: 0 0 20px rgba(255, 204, 0, 0.3);
            letter-spacing: 4px;
        }

        .subtitle {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-blue);
        }

        .game-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 1000px;
            margin-bottom: 40px;
        }

        .panel {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            flex: 1;
            min-width: 300px;
            max-width: 450px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .trade-panel { border-color: var(--trade-purple); }

        .math-box {
            font-size: 2.2rem;
            font-weight: bold;
            margin: 15px 0;
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
        }

        input[type="number"] {
            background: var(--primary-dark);
            border: 2px solid var(--accent-gold);
            color: white;
            padding: 12px;
            font-size: 1.5rem;
            width: 100px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 15px;
        }

        button {
            padding: 12px 24px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            background: var(--accent-gold);
            color: var(--primary-dark);
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        button:hover:not(:disabled) { transform: scale(1.05); }
        button:disabled { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }

        .btn-trade { background: var(--trade-purple); color: white; margin-top: 10px; }

        .album-nav { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        .nav-btn { background: transparent; color: white; border: 1px solid var(--accent-blue); padding: 8px 15px; }
        .nav-btn.active { background: var(--accent-blue); color: var(--primary-dark); }

        .album-page {
            display: none;
            width: 100%;
            max-width: 900px;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
        }
        .album-page.active { display: grid; animation: fadeIn 0.4s; }

        .sticker {
            aspect-ratio: 3/4;
            background: var(--empty-slot);
            border: 2px dashed rgba(0, 212, 255, 0.1);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            text-align: center;
            padding: 10px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .sticker.owned {
            background: linear-gradient(145deg, #162c50, #0a192f);
            border: 2px solid var(--accent-gold);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .sticker.owned:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 10px 25px rgba(255, 204, 0, 0.3);
            border-color: var(--accent-blue);
            z-index: 10;
        }

        .sticker:not(.owned):hover {
            border-color: rgba(0, 212, 255, 0.4);
            background: rgba(255, 255, 255, 0.08);
        }

        .repeat-tag {
            position: absolute;
            top: -5px; right: -5px;
            background: #ff4757;
            padding: 4px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .progress-section { width: 100%; max-width: 900px; margin-bottom: 30px; text-align: center; }
        .progress-bar { height: 12px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 10px; overflow: hidden; }
        #progress-fill { height: 100%; background: var(--accent-gold); width: 0%; transition: width 1s ease; }

        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn-reset { margin-top: 40px; background: transparent; color: #ff4757; border: 1px solid #ff4757; font-size: 0.7rem; margin-bottom: 20px; }
    </style>
</head>
<body>

    <header>
        <h1>ALPHA DX</h1>
        <div class="subtitle">Colección Institucional ECOEMS</div>
    </header>

    <div class="progress-section">
        <strong id="statsText">0 / 0 FIGURITAS</strong>
        <div id="repeat-count" style="color: var(--accent-blue); font-size: 0.9rem; margin-top: 5px;">Repetidas: 0</div>
        <div class="progress-bar"><div id="progress-fill"></div></div>
    </div>

    <div class="game-container">
        <div class="panel">
            <div id="quiz-ui">
                <p>Resuelve para ganar un sobre:</p>
                <div class="math-box" id="equation">--</div>
                <input type="number" id="user-answer" placeholder="?">
                <br>
                <button onclick="checkMath()">Validar</button>
            </div>
            <div id="reward-ui" style="display:none;">
                <h3 style="color: var(--accent-gold);">¡CORRECTO!</h3>
                <div style="font-size: 3rem; margin: 10px 0;">📦</div>
                <button onclick="openPack()">Abrir Sobre</button>
            </div>
        </div>

        <div class="panel trade-panel">
            <h3 style="color: var(--trade-purple);">CENTRO DE TRADEO</h3>
            <p style="font-size: 0.8rem;">Cambia 2 repetidas por una carta aleatoria</p>
            <div id="trade-visual" style="font-size: 2rem; margin: 10px 0;">🔄</div>
            <button id="btnTrade" class="btn-trade" onclick="handleTrade()" disabled>Intercambiar (2)</button>
        </div>
    </div>

    <div class="album-nav">
        <button class="nav-btn active" onclick="showPage(1)">Pág 1</button>
        <button class="nav-btn" onclick="showPage(2)">Pág 2</button>
        <button class="nav-btn" onclick="showPage(3)">Pág 3</button>
        <button class="nav-btn" onclick="showPage(4)">Pág 4</button>
        <button class="nav-btn" onclick="showPage(5)">Pág 5</button>
        <button class="nav-btn" onclick="showPage(6)">Pág 6</button>
        <button class="nav-btn" onclick="showPage(7)">Pág 7</button>
        <!-- Nuevas Páginas -->
        <button class="nav-btn" onclick="showPage(8)">Pág 8</button>
        <button class="nav-btn" onclick="showPage(9)">Pág 9</button>
        <button class="nav-btn" onclick="showPage(10)">Pág 10</button>
    </div>

    <div id="p1" class="album-page active"></div>
    <div id="p2" class="album-page"></div>
    <div id="p3" class="album-page"></div>
    <div id="p4" class="album-page"></div>
    <div id="p5" class="album-page"></div>
    <div id="p6" class="album-page"></div>
    <div id="p7" class="album-page"></div>
    <div id="p8" class="album-page"></div>
    <div id="p9" class="album-page"></div>
    <div id="p10" class="album-page"></div>

    <button class="btn-reset" onclick="resetAlbum()">Reiniciar Álbum</button>

    <script>
        const CONFIG = {
            cards: [
                { id: 0, name: "Alpha dx", page: 1, icon: "🛡️" },
                { id: 1, name: "ECOEMS 2026", page: 1, icon: "🎓" },
                { id: 2, name: "128 ACIERTOS", page: 1, icon: "💯" },
                { id: 3, name: "Benjamín", page: 2, icon: "👨‍🏫" },
                { id: 4, name: "Hans", page: 2, icon: "👨‍💻" },
                { id: 5, name: "Rainer", page: 2, icon: "🔬" },
                { id: 6, name: "Física", page: 3, icon: "⚛️" },
                { id: 7, name: "Historia", page: 3, icon: "📜" },
                { id: 8, name: "Hab. Verbal", page: 3, icon: "🗣️" },
                { id: 9, name: "Dentista", page: 4, icon: "🦷" },
                { id: 10, name: "Beta dx", page: 4, icon: "🚀" },
                { id: 11, name: "Milenials dx", page: 4, icon: "📱" },
                { id: 12, name: "Tiktok", page: 5, icon: "🎵" },
                { id: 13, name: "Whatsapp", page: 5, icon: "💬" },
                { id: 14, name: "Zoom", page: 5, icon: "📹" },
                { id: 15, name: "Apuntes", page: 6, icon: "📝" },
                { id: 16, name: "Examen simulacro", page: 6, icon: "✍️" },
                { id: 17, name: "Clases Grabadas", page: 6, icon: "🎥" },
                { id: 18, name: "Alpha Dx Oro", page: 7, icon: "🥇" },
                { id: 19, name: "Alpha Dx Plata", page: 7, icon: "🥈" },
                { id: 20, name: "Alpha Dx Cobre", page: 7, icon: "🥉" },
                // --- PÁGINA 8 ---
                { id: 21, name: "Porfirio Díaz", page: 8, icon: "🎩" },
                { id: 22, name: "Álvaro Obregón", page: 8, icon: "🎖️" },
                { id: 23, name: "Emiliano Zapata", page: 8, icon: "🐎" },
                // --- PÁGINA 9 ---
                { id: 24, name: "Isaac Newton", page: 9, icon: "🍎" },
                { id: 25, name: "Pitágoras", page: 9, icon: "📐" },
                { id: 26, name: "Einstein", page: 9, icon: "🧠" },
                // --- PÁGINA 10 ---
                { id: 27, name: "Relieve", page: 10, icon: "⛰️" },
                { id: 28, name: "Clima", page: 10, icon: "☀️" },
                { id: 29, name: "Vegetación", page: 10, icon: "🌿" }
            ],
            tradeCost: 2
        };

        let inventory = JSON.parse(localStorage.getItem('alphaDxPremium')) || {};
        let currentResult = 0;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(freq, type, duration, vol = 0.1) {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function newChallenge() {
            const ops = ['+', '-', '*'];
            const op = ops[Math.floor(Math.random() * ops.length)];
            let n1 = Math.floor(Math.random() * 10) + 1;
            let n2 = Math.floor(Math.random() * 10) + 1;
            
            if (op === '+') currentResult = n1 + n2;
            if (op === '-') currentResult = n1 - n2;
            if (op === '*') currentResult = n1 * n2;

            const symbols = { '+': '+', '-': '-', '*': '×' };
            document.getElementById('equation').innerText = `${n1} ${symbols[op]} ${n2}`;
            document.getElementById('user-answer').value = '';
        }

        function checkMath() {
            initAudio();
            const val = parseInt(document.getElementById('user-answer').value);
            if (val === currentResult) {
                playSound(880, 'sine', 0.2); 
                document.getElementById('quiz-ui').style.display = 'none';
                document.getElementById('reward-ui').style.display = 'block';
            } else {
                playSound(150, 'sawtooth', 0.3); 
                alert("¡Sigue intentando!");
            }
        }

        function openPack() {
            const randomCard = CONFIG.cards[Math.floor(Math.random() * CONFIG.cards.length)];
            addCard(randomCard);
            document.getElementById('quiz-ui').style.display = 'block';
            document.getElementById('reward-ui').style.display = 'none';
            newChallenge();
        }

        function handleTrade() {
            initAudio();
            const totalRepeats = calculateRepeats();
            if (totalRepeats < CONFIG.tradeCost) return;

            playSound(300, 'square', 0.1);
            setTimeout(() => playSound(450, 'square', 0.1), 100);
            setTimeout(() => playSound(600, 'square', 0.2), 200);

            let consumed = 0;
            for (let id in inventory) {
                while (inventory[id] > 1 && consumed < CONFIG.tradeCost) {
                    inventory[id]--;
                    consumed++;
                }
            }
            
            const randomCard = CONFIG.cards[Math.floor(Math.random() * CONFIG.cards.length)];
            setTimeout(() => addCard(randomCard), 400);
        }

        function addCard(card) {
            const isNew = !inventory[card.id];
            inventory[card.id] = (inventory[card.id] || 0) + 1;
            localStorage.setItem('alphaDxPremium', JSON.stringify(inventory));
            
            playSound(523, 'sine', 0.1);
            setTimeout(() => playSound(783, 'sine', 0.4), 100);

            alert(`${isNew ? '✨ ¡NUEVA FIGURITA!' : '🃏 REPETIDA'}\nHas obtenido: ${card.name}`);
            
            updateUI();
            showPage(card.page);
        }

        function calculateRepeats() {
            return Object.values(inventory).reduce((acc, c) => acc + (c > 1 ? c - 1 : 0), 0);
        }

        function updateUI() {
            const totalPages = 10;
            for (let i = 1; i <= totalPages; i++) {
                const container = document.getElementById(`p${i}`);
                if (!container) continue;
                container.innerHTML = '';
                CONFIG.cards.filter(c => c.page === i).forEach(card => {
                    const count = inventory[card.id] || 0;
                    const div = document.createElement('div');
                    div.className = `sticker ${count > 0 ? 'owned' : ''}`;
                    if (count > 0) {
                        div.innerHTML = `
                            <div style="font-size:3rem">${card.icon}</div>
                            <div style="font-size:0.8rem; font-weight:bold">${card.name}</div>
                            ${count > 1 ? `<div class="repeat-tag">x${count-1}</div>` : ''}
                        `;
                    } else {
                        div.innerHTML = `<div style="opacity:0.1; font-size:2rem">?</div>`;
                    }
                    container.appendChild(div);
                });
            }

            const unique = Object.keys(inventory).length;
            const total = CONFIG.cards.length;
            const repeats = calculateRepeats();
            
            document.getElementById('statsText').innerText = `${unique} / ${total} FIGURITAS`;
            document.getElementById('progress-fill').style.width = `${(unique/total)*100}%`;
            document.getElementById('repeat-count').innerText = `Repetidas: ${repeats}`;
            document.getElementById('btnTrade').disabled = repeats < CONFIG.tradeCost;
        }

        function showPage(num) {
            playSound(440, 'triangle', 0.05, 0.05); 
            document.querySelectorAll('.album-page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            const pageTarget = document.getElementById(`p${num}`);
            if(pageTarget) pageTarget.classList.add('active');
            
            const navBtns = document.querySelectorAll('.nav-btn');
            if(navBtns[num-1]) navBtns[num-1].classList.add('active');
        }

        function resetAlbum() {
            if(confirm("¿Seguro que quieres borrar todo el progreso?")) {
                localStorage.removeItem('alphaDxPremium');
                location.reload();
            }
        }

        updateUI();
        newChallenge();
    </script>
</body>
</html>
